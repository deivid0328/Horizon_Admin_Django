{% extends 'base.html' %}

{% block content %}
<div class="p-6 max-w-md mx-auto">
  <div class="bg-white shadow rounded-2xl p-6 text-center">
    <h2 class="text-xl font-semibold mb-4 text-gray-700">¿Eliminar reserva?</h2>

    <p class="text-gray-600 mb-6">
      Esta acción no se puede deshacer.
    </p>

    <form method="POST">
      {% csrf_token %}

      <div class="flex justify-center gap-4">
        <a href="{% url 'reservation_list' %}" 
           class="px-4 py-2 bg-slate-200 text-gray-700  rounded-lg">
          Cancelar
        </a>

        <button type="submit" 
                class="px-4 py-2 bg-red-600 text-white rounded-lg">
          Eliminar
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
