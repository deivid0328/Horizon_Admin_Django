{% extends 'base.html' %}

{% block content %}
<div class="mx-auto max-w-md p-6">
  <div class="glass-card p-6 text-center">
    <h2 class="mb-3 text-xl font-semibold text-white">¿Eliminar reserva?</h2>

    <p class="mb-6 text-sm text-slate-400">
      Esta acción no se puede deshacer.
    </p>

    <form method="POST">
      {% csrf_token %}

      <div class="flex justify-center gap-4">
        <a href="{% url 'reservation_list' %}" 
           class="rounded-xl border border-slate-700 bg-slate-800/80 px-4 py-2.5 text-sm text-slate-300 transition hover:bg-slate-700">
          Cancelar
        </a>

        <button type="submit" 
                class="rounded-xl bg-rose-500 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-rose-400">
          Eliminar
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
