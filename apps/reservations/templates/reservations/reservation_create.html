{% extends 'base.html' %}

{% block content %}
<div class="p-6 max-w-2xl mx-auto">
  <h1 class="text-2xl font-bold mb-6 ">Nueva Reserva</h1>

  <form method="POST" class="bg-white p-6 rounded-2xl shadow space-y-4 text-gray-700">
    {% csrf_token %}

    <div>
      <label class="block text-sm font-medium">Nombre del residente</label>
      {{ form.resident_name }}
    </div>

    <div>
      <label class="block text-sm font-medium">Área</label>
      {{ form.area }}
    </div>

    <div>
      <label class="block text-sm font-medium">Fecha</label>
      {{ form.reservation_date }}
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium">Hora inicio</label>
        {{ form.start_time }}
      </div>

      <div>
        <label class="block text-sm font-medium">Hora fin</label>
        {{ form.end_time }}
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium">Estado</label>
      {{ form.status }}
    </div>

    <div class="flex justify-end gap-2 pt-4">
      <a href="{% url 'reservation_list' %}" 
         class="px-4 py-2  rounded-lg">Cancelar</a>

      <button type="submit" 
              class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">
        Guardar
      </button>
    </div>
  </form>
</div>
{% endblock %}
