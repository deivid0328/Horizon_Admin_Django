{% extends 'base.html' %}

{% block content %}

<h2 class="text-2xl font-bold mb-6">
Crear PQR
</h2>

<form method="post" class="bg-white p-6 shadow rounded">

{% csrf_token %}

<div class="mb-4">

<label class="block text-gray-600">
Titulo
</label>

{{ form.title }}

</div>

<div class="mb-4">

<label>
Descripción
</label>

{{ form.description }}

</div>

<div class="mb-4">

<label>
Estado
</label>

{{ form.status }}

</div>

<button class="bg-indigo-600 text-white px-4 py-2 rounded">

Guardar

</button>

</form>

{% endblock %}
