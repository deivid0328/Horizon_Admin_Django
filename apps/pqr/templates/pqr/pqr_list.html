{% extends 'base.html' %}

{% block content %}

<div class="flex justify-between mb-6">

<h2 class="text-2xl font-bold">Gestión de PQR</h2>

<a href="/pqr/create/" class="bg-indigo-600 text-white px-4 py-2 rounded">
Nueva PQR
</a>

</div>

<table class="w-full bg-white shadow rounded">

<thead class="bg-gray-200">

<tr>

<th class="p-3">Titulo</th>

<th>Estado</th>

<th>Fecha</th>

<th>Acciones</th>

</tr>

</thead>

<tbody>

{% for item in pqr %}

<tr class="border-t">

<td class="p-3">{{item.title}}</td>

<td>{{item.status}}</td>

<td>{{item.created_at}}</td>

<td class="space-x-2">

<a href="/pqr/{{item.id}}" class="text-blue-600">
Ver
</a>

<a href="/pqr/{{item.id}}/delete" class="text-red-600">
Eliminar
</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

{% endblock %}
